<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Student Score Table</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<div class="container">
  <p class="small">Made by Duy Thong 24CSE @BAKKAA3K
  </p>
</div>

	<main class="page">
		<div class="table-wrap">
			<table class="score-table">
				<caption>Student Scores for Midterm Assessment - Java OOP </caption>
				<thead>
					<tr>
						<th scope="col">No.</th>
						<th scope="col">Student Name</th>
						<th scope="col">Score</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td data-label="No.">1</td>
						<td data-label="Student Name">Duy Thong</td>
						<td data-label="Score">88</td>
					</tr>
					<tr>
						<td data-label="No.">2</td>
						<td data-label="Student Name">Le Hoang</td>
						<td data-label="Score">92</td>
					</tr>
					<tr>
						<td data-label="No.">3</td>
						<td data-label="Student Name">Duc Minh</td>
						<td data-label="Score">76</td>
					</tr>
					<tr>
						<td data-label="No.">4</td>
						<td data-label="Student Name">Tuan Kiet</td>
						<td data-label="Score">84</td>
					</tr>
					<tr>
						<td data-label="No.">5</td>
						<td data-label="Student Name">Tam Duc</td>
						<td data-label="Score">95</td>
					</tr>
					<tr>
						<td data-label="No.">6</td>
						<td data-label="Student Name">Hoang Trieu</td>
						<td data-label="Score">81</td>
					</tr>
					<tr>
						<td data-label="No.">7</td>
						<td data-label="Student Name">Ngo Ngo</td>
						<td data-label="Score">89</td>
					</tr>
					<tr>
						<td data-label="No.">8</td>
						<td data-label="Student Name">Dinh Hieu</td>
						<td data-label="Score">73</td>
					</tr>
					<tr>
						<td data-label="No.">9</td>
						<td data-label="Student Name">Phuong Nam</td>
						<td data-label="Score">90</td>
					</tr>
					<tr>
						<td data-label="No.">10</td>
						<td data-label="Student Name">Cong Nguyen</td>
						<td data-label="Score">82</td>
					</tr>
					<tr class="summary-row">
						<td colspan="2">Average Score</td>
						<td data-label="Average Score">85</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
